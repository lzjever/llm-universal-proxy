name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  GHCR_IMAGE: ghcr.io/lzjever/llm-universal-proxy

jobs:
  governance:
    name: Governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check version and toolchain governance
        run: bash scripts/check-governance.sh

  check:
    name: Check
    runs-on: ubuntu-latest
    needs: governance
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Read repo metadata
        id: repo_meta
        run: python scripts/repo_metadata.py github-output

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ steps.repo_meta.outputs.rust_toolchain }}

      - name: Check
        run: cargo check --locked --verbose

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: governance
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Read repo metadata
        id: repo_meta
        run: python scripts/repo_metadata.py github-output

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ steps.repo_meta.outputs.rust_toolchain }}

      - name: Run Rust tests
        run: cargo test --locked --verbose

      - name: Run Python contract tests
        if: ${{ always() }}
        run: PYTHONDONTWRITEBYTECODE=1 python3 -m unittest discover -s tests -p 'test*.py'

  fmt:
    name: Format
    runs-on: ubuntu-latest
    needs: governance
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Read repo metadata
        id: repo_meta
        run: python scripts/repo_metadata.py github-output

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ steps.repo_meta.outputs.rust_toolchain }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: governance
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Read repo metadata
        id: repo_meta
        run: python scripts/repo_metadata.py github-output

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ steps.repo_meta.outputs.rust_toolchain }}
          components: clippy

      - name: Run clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  smoke:
    name: Binary Smoke
    runs-on: ubuntu-latest
    needs: governance
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Read repo metadata
        id: repo_meta
        run: python scripts/repo_metadata.py github-output

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ steps.repo_meta.outputs.rust_toolchain }}

      - name: Build release binary
        run: cargo build --locked --release --verbose

      - name: Run binary smoke
        run: bash scripts/test_binary_smoke.sh
        env:
          PROXY_BIN: ./target/release/llm-universal-proxy

  container:
    name: Container Image Smoke
    runs-on: ubuntu-latest
    needs: governance
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Read repo metadata
        id: repo_meta
        run: python scripts/repo_metadata.py github-output

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image without pushing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: llm-universal-proxy:ci
          build-args: |
            VERSION=${{ steps.repo_meta.outputs.version }}
            VCS_REF=${{ github.sha }}

      - name: Run container smoke
        run: IMAGE=llm-universal-proxy:ci bash scripts/test_container_smoke.sh
