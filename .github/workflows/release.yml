name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GHCR_IMAGE: ghcr.io/lzjever/llm-universal-proxy

jobs:
  governance:
    name: Governance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check version and toolchain governance
        run: bash scripts/check-governance.sh

  fmt:
    name: Format
    runs-on: ubuntu-latest
    needs: governance
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Read repo metadata
        id: repo_meta
        run: python scripts/repo_metadata.py github-output

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ steps.repo_meta.outputs.rust_toolchain }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: governance
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Read repo metadata
        id: repo_meta
        run: python scripts/repo_metadata.py github-output

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ steps.repo_meta.outputs.rust_toolchain }}
          components: clippy

      - name: Run clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: [governance, fmt, clippy, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: llm-universal-proxy
            asset_name: llm-universal-proxy-linux-x86_64
          # Linux aarch64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: llm-universal-proxy
            asset_name: llm-universal-proxy-linux-aarch64
          # macOS x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: llm-universal-proxy
            asset_name: llm-universal-proxy-macos-x86_64
          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: llm-universal-proxy
            asset_name: llm-universal-proxy-macos-aarch64
          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: llm-universal-proxy.exe
            asset_name: llm-universal-proxy-windows-x86_64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Read repo metadata
        id: repo_meta
        run: python scripts/repo_metadata.py github-output

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ steps.repo_meta.outputs.rust_toolchain }}
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Run binary smoke
        if: matrix.target == 'x86_64-unknown-linux-gnu' && matrix.os == 'ubuntu-latest'
        run: bash scripts/test_binary_smoke.sh
        env:
          PROXY_BIN: ./target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          strip ${{ matrix.artifact_name }} || true
          tar -czvf ${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}
          shasum -a 256 ${{ matrix.asset_name }}.tar.gz > ${{ matrix.asset_name }}.tar.gz.sha256

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ${{ matrix.asset_name }}.zip ${{ matrix.artifact_name }}
          certutil -hashfile ${{ matrix.asset_name }}.zip SHA256 > ${{ matrix.asset_name }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            target/${{ matrix.target }}/release/*.tar.gz
            target/${{ matrix.target }}/release/*.zip
            target/${{ matrix.target }}/release/*.sha256

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: governance
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Read repo metadata
        id: repo_meta
        run: python scripts/repo_metadata.py github-output

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ steps.repo_meta.outputs.rust_toolchain }}

      - name: Run tests
        run: cargo test --locked --verbose

  container:
    name: Publish GHCR Image
    runs-on: ubuntu-latest
    needs: [governance, fmt, clippy, test]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Read repo metadata
        id: repo_meta
        run: python scripts/repo_metadata.py github-output

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build local image for smoke
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: llm-universal-proxy:release-smoke
          build-args: |
            VERSION=${{ steps.repo_meta.outputs.version }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke
        run: IMAGE=llm-universal-proxy:release-smoke bash scripts/test_container_smoke.sh

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ github.ref_name }}
            ${{ env.GHCR_IMAGE }}:${{ steps.repo_meta.outputs.version }}
            ${{ env.GHCR_IMAGE }}:latest
          build-args: |
            VERSION=${{ steps.repo_meta.outputs.version }}
            VCS_REF=${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/lzjever/llm-universal-proxy
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.repo_meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    needs: [governance, fmt, clippy, build, test, container]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -laR artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: CHANGELOG.md
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
