services:
  llmup:
    image: ${LLMUP_IMAGE:-ghcr.io/agentsmith-project/llm-universal-proxy:v0.2.22}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./container-config.yaml:/etc/llmup/config.yaml:ro
    environment:
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:?set OPENAI_COMPATIBLE_API_KEY}
      ANTHROPIC_COMPATIBLE_API_KEY: ${ANTHROPIC_COMPATIBLE_API_KEY:?set ANTHROPIC_COMPATIBLE_API_KEY}
      LLM_UNIVERSAL_PROXY_ADMIN_TOKEN: ${LLM_UNIVERSAL_PROXY_ADMIN_TOKEN:?set LLM_UNIVERSAL_PROXY_ADMIN_TOKEN}
      LLM_UNIVERSAL_PROXY_AUTH_MODE: proxy_key
      LLM_UNIVERSAL_PROXY_KEY: ${LLM_UNIVERSAL_PROXY_KEY:?set LLM_UNIVERSAL_PROXY_KEY}
