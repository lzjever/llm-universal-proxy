# Historical concrete example.
#
# MiniMax is a replaceable OpenAI-compatible example, not a GA-required provider
# and not the main CLI-wrapper preset path. The recommended user-entry config
# source is quickstart-provider-neutral.yaml; this file shows how to replace
# provider-neutral PRESET_* placeholders with concrete upstreams when you want
# an explicit OpenAI + MiniMax sample.

listen: 127.0.0.1:8080
upstream_timeout_secs: 120

upstreams:
  OPENAI_RESPONSES_EXAMPLE:
    api_root: https://api.openai.com/v1
    format: openai-responses
    credential_env: OPENAI_API_KEY
    auth_policy: force_server
    surface_defaults:
      modalities:
        input: ["text"]
        output: ["text"]
      tools:
        supports_search: false
        supports_view_image: false
        apply_patch_transport: freeform
        supports_parallel_calls: false

  MINIMAX_OPENAI_COMPATIBLE_EXAMPLE:
    api_root: https://api.minimaxi.com/v1
    format: openai-completion
    credential_env: MINIMAX_API_KEY
    auth_policy: force_server
    surface_defaults:
      modalities:
        input: ["text"]
        output: ["text"]
      tools:
        supports_search: false
        supports_view_image: false
        apply_patch_transport: freeform
        supports_parallel_calls: false

model_aliases:
  openai-responses-example: OPENAI_RESPONSES_EXAMPLE:gpt-5.4
  minimax-openai-compatible-example: MINIMAX_OPENAI_COMPATIBLE_EXAMPLE:MiniMax-M2.7-highspeed
