listen: 0.0.0.0:8080
upstream_timeout_secs: 120

upstreams:
  OPENAI_COMPATIBLE:
    api_root: https://openai-compatible.example/v1
    format: openai-completion
    provider_key_env: OPENAI_COMPATIBLE_API_KEY
    limits:
      context_window: 200000
      max_output_tokens: 128000
    surface_defaults:
      modalities:
        input: ["text"]
        output: ["text"]
      tools:
        supports_search: false
        supports_view_image: false
        apply_patch_transport: freeform
        supports_parallel_calls: false

  ANTHROPIC_COMPATIBLE:
    api_root: https://anthropic-compatible.example/v1
    format: anthropic
    provider_key_env: ANTHROPIC_COMPATIBLE_API_KEY
    limits:
      context_window: 200000
      max_output_tokens: 128000
    surface_defaults:
      modalities:
        input: ["text"]
        output: ["text"]
      tools:
        supports_search: false
        supports_view_image: false
        apply_patch_transport: freeform
        supports_parallel_calls: false

model_aliases:
  openai-compatible-chat: OPENAI_COMPATIBLE:example-openai-compatible-model
  anthropic-compatible-messages: ANTHROPIC_COMPATIBLE:example-anthropic-compatible-model
